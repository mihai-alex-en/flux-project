apiVersion: apps/v1
kind: Deployment
metadata:
  name: allowed-client
  namespace: calico-demo-client
  labels:
    app.kubernetes.io/name: allowed-client
    app.kubernetes.io/part-of: calico-policy-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: allowed-client
      access: allowed
  template:
    metadata:
      labels:
        app.kubernetes.io/name: allowed-client
        app.kubernetes.io/part-of: calico-policy-demo
        access: allowed
    spec:
      containers:
        - name: curl
          image: curlimages/curl:8.8.0
          command:
            - sh
            - -c
            - sleep infinity
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
