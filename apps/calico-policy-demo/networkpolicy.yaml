apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: calico-demo-server
  labels:
    app.kubernetes.io/part-of: calico-policy-demo
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-echo-from-allowed-client
  namespace: calico-demo-server
  labels:
    app.kubernetes.io/part-of: calico-policy-demo
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: echo
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              policy-test/client: "true"
          podSelector:
            matchLabels:
              access: allowed
      ports:
        - protocol: TCP
          port: 8080
